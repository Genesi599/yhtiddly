<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>同步设置</title>
<style>
    body {
        font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 13px;
        margin: 0;
        padding: 18px 22px;
        background: #fafafa;
        color: #222;
    }
    h1 { font-size: 15px; margin: 0 0 14px; }
    label { display: block; margin-top: 12px; font-weight: 500; }
    input[type=text], input[type=password], input[type=number] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        font-family: inherit;
        margin-top: 4px;
    }
    input[type=text]:focus, input[type=password]:focus, input[type=number]:focus {
        outline: none;
        border-color: #4a90e2;
    }
    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; }
    .hint { color: #888; font-size: 11px; margin-top: 3px; }
    .btnrow { margin-top: 18px; display: flex; gap: 8px; align-items: center; }
    button {
        padding: 6px 14px;
        border: 1px solid #ccc;
        background: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
    }
    button:hover { background: #f0f0f0; }
    button.primary { background: #4a90e2; color: white; border-color: #4a90e2; }
    button.primary:hover { background: #3a7fd0; }
    button.danger { color: #c44; border-color: #c44; }
    button.danger:hover { background: #fee; }
    #status { margin-left: auto; font-size: 12px; }
    #status.ok { color: #3a3; }
    #status.err { color: #c44; }
    .section { margin-top: 22px; padding-top: 14px; border-top: 1px solid #e0e0e0; }
</style>
</head>
<body>

<h1>TiddlyWiki 远程同步设置</h1>

<label>远程服务器地址</label>
<input type="text" id="remoteUrl" placeholder="https://yhtiddly.fun">
<div class="hint">TiddlyWiki Node.js 服务器的根 URL（不要加尾部斜杠）</div>

<div class="row">
    <div>
        <label>用户名（可选）</label>
        <input type="text" id="username" placeholder="留空表示匿名">
    </div>
    <div>
        <label>密码（可选）</label>
        <input type="password" id="password">
    </div>
</div>

<div class="row">
    <div>
        <label>本地端口</label>
        <input type="number" id="localPort" value="3000" min="1024" max="65535">
    </div>
    <div>
        <label>同步间隔（毫秒）</label>
        <input type="number" id="syncInterval" value="15000" min="1000" step="1000">
        <div class="hint">默认 15000 = 15 秒</div>
    </div>
</div>

<div class="btnrow">
    <button id="btnTest">测试连接</button>
    <button id="btnSave" class="primary">保存</button>
    <div id="status"></div>
</div>

<div class="section">
    <label>维护</label>
    <div class="btnrow">
        <button id="btnSyncNow">立即同步</button>
        <button id="btnReset" class="danger">清空本地缓存</button>
    </div>
    <div class="hint">清空本地缓存会触发下次启动时重新从远程全量拉取。</div>
</div>

<script>
(async function() {
    const $ = (id) => document.getElementById(id);
    const cfg = await window.twApi.getConfig();
    $('remoteUrl').value = cfg.remoteUrl || '';
    $('username').value = cfg.username || '';
    $('password').value = cfg.password || '';
    $('localPort').value = cfg.localPort || 3000;
    $('syncInterval').value = cfg.syncInterval || 15000;

    function setStatus(msg, cls) {
        const el = $('status');
        el.textContent = msg;
        el.className = cls || '';
    }

    $('btnTest').onclick = async () => {
        setStatus('测试中...', '');
        const r = await window.twApi.testConnection({
            url: $('remoteUrl').value.trim(),
            username: $('username').value,
            password: $('password').value
        });
        if (r.ok) {
            setStatus('连接成功 ✓ TW ' + (r.data.tiddlywiki_version || ''), 'ok');
        } else {
            setStatus('失败：' + r.error, 'err');
        }
    };

    $('btnSave').onclick = async () => {
        await window.twApi.saveConfig({
            remoteUrl: $('remoteUrl').value.trim().replace(/\/+$/, ''),
            username: $('username').value,
            password: $('password').value,
            localPort: parseInt($('localPort').value, 10) || 3000,
            syncInterval: parseInt($('syncInterval').value, 10) || 15000
        });
        setStatus('已保存', 'ok');
        setTimeout(() => window.twApi.closeSettings(), 400);
    };

    $('btnSyncNow').onclick = async () => {
        setStatus('同步中...', '');
        const r = await window.twApi.syncNow();
        if (r && r.error) setStatus('失败: ' + r.error, 'err');
        else setStatus('推送 ' + (r.pushed || 0) + ' 条，拉取 ' + (r.pulled || 0) + ' 条', 'ok');
    };

    $('btnReset').onclick = async () => {
        if (!confirm('确定要清空本地缓存吗？下次启动会重新全量拉取。')) return;
        const r = await window.twApi.resetLocalDb();
        if (r.ok) setStatus('已清空，重启应用后生效', 'ok');
        else setStatus('失败: ' + r.error, 'err');
    };
})();
</script>

</body>
</html>
